spring.application.name=agenda

# --- CONFIGURAÇÕES DE BANCO DE DATA (Híbrido: Local e Render) ---
# Se o Render fornecer a URL, ele usa. Se não, usa o localhost para o seu Docker/IntelliJ.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/barbearia_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Importante para versões recentes do Postgres no Render
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- MENSAGENS E INTERNACIONALIZAÇÃO ---
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# --- SEGURANÇA ---
# No Render, é recomendável criar uma variável env para a secret do JWT
api.security.token.secret=${JWT_SECRET:minha_chave_secreta_padrao_123}
spring.security.user.name=admin
spring.security.user.password=admin123

# --- DOCUMENTAÇÃO (SWAGGER) ---
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true